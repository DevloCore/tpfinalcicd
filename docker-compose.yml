version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taskflow-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskflow-net
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: taskflow-api
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/taskflow}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskflow-net

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - taskflow-net

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: taskflow-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - taskflow-net

volumes:
  mongodb_data:
  jenkins_home:

networks:
  taskflow-net:
    driver: bridge
